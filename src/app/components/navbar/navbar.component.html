<nav class="navbar" [class.menu-open]="isMenuOpen">
  <div class="nav-container">
    <a href="#" class="logo">Fida.</a>

    <div class="nav-links" [class.active]="isMenuOpen">
      <a href="#about" (click)="scrollTo('about', $event)">{{ ui.navAbout }}</a>
      <a href="#skills" (click)="scrollTo('skills', $event)">{{ ui.navSkills }}</a>
      <a href="#experience" (click)="scrollTo('experience', $event)">{{ ui.navExperience }}</a>
      <a href="#projects" (click)="scrollTo('projects', $event)">{{ ui.navProjects }}</a>
      <a href="#education" (click)="scrollTo('education', $event)">{{ ui.titleEducation }}</a>
      <a href="#contact" (click)="scrollTo('contact', $event)">{{ ui.navContact }}</a>
    </div>

    <div class="nav-controls">
      <button class="icon-btn" (click)="toggleLanguage()" aria-label="Toggle Language">
        <span>{{ currentLang === 'en' ? 'EN' : 'ID' }}</span>
      </button>
      <button class="icon-btn" (click)="toggleTheme()" aria-label="Toggle Dark Mode">
        <svg *ngIf="!isDarkMode" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        <svg *ngIf="isDarkMode" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
      </button>

      <button class="mobile-menu-toggle" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen" aria-label="Toggle Menu">
        <svg *ngIf="!isMenuOpen" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        <svg *ngIf="isMenuOpen" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
  </div>
</nav>
