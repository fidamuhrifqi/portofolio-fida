<section id="education" class="education-section">
  <div class="container">
    <h2 class="section-title">Education</h2>
    
    <div class="education-grid">
      <div *ngFor="let item of educationData; let i = index" class="edu-card card fade-in delay-{{i + 1}}">
        <div class="edu-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-book"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
        </div>
        <div class="edu-content">
          <h3 class="degree">{{ item.degree }}</h3>
          <h4 class="institution">{{ item.institution }}</h4>
          <span class="period">{{ item.period }}</span>
          <p class="details">{{ item.details }}</p>
        </div>
      </div>
    </div>
  </div>
</section>
