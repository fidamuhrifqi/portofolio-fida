<section id="projects" class="projects-section">
  <div class="container">
    <h2 class="section-title">Noteworthy Projects</h2>
    
    <div class="projects-grid">
      <div *ngFor="let project of projectsData; let i = index" class="project-card card fade-in delay-{{(i % 3) + 1}}">
        <div class="project-content">
          <div class="folder-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-folder"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          </div>
          <h3 class="project-title">{{ project.name }}</h3>
          <p class="project-description">{{ project.description }}</p>
        </div>
        
        <div class="project-tech">
          <span *ngFor="let tech of project.techStack">{{ tech }}</span>
        </div>
      </div>
    </div>
  </div>
</section>
