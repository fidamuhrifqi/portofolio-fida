<section id="about" class="about-section">
  <div class="container">
    <h2 class="section-title">{{ ui.titleAbout }}</h2>
    
    <div class="about-content">
      <div class="text-content">
        <p *ngFor="let para of aboutData.paragraphs; let i = index; trackBy: trackByIndex" class="fade-in delay-{{i+1}}">{{ para }}</p>
      </div>
    </div>
  </div>
</section>
